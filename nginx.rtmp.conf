worker_processes  1;

events {
	worker_connections 1024;
}
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        application hls {
            live on;
            hls on;
            hls_path /var/hls;
            hls_fragment 1s;
            on_publish http://backend-python:6000/stream_creation;
        }
    }
}
