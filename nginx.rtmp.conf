worker_processes  1;

events {
	worker_connections 1024;
}
http {
    server {
        listen 8000;
        server_name localhost;
        add_header Access-Control-Allow-Origin *;
        location /hls/ {
            types {
              application/vnd.apple.mpegurl m3u8;
              video/mp2t ts;
            } 
            alias /var/hls/;
            expires -1;
        }
   }
}


